<header class="header">
    <span
        class="absolute top-1 right-1 text-[clamp(0.4rem,1.2vw,0.5rem)] whitespace-nowrap pointer-events-none text-yellow-400">Last
        update: {{ lastUpdate | date:'short' }}</span>
    <div class="header-content">
        <div id="header-title" class="header-title">
            <sup class="header-sup">modern</sup>
            <h3 class="header-title">Angular Nx Micro-frontend App</h3>
            <sub class="header-sub">propose by L.Kővári</sub>
        </div>
        <nav class="header-nav">
            <a routerLink="/mf_remote_a" routerLinkActive="active">Remote <span class="text-green-500">A</span></a>
            <a routerLink="/mf_remote_b" routerLinkActive="active">Remote <span class="text-blue-500">B</span></a>
            <a routerLink="/mf_remote_c" routerLinkActive="active">Remote <span class="text-orange-500">C</span></a>
        </nav>
    </div>
</header>
